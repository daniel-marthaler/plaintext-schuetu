<?xml version="1.0" encoding="utf-8" standalone="no"?>

<!--suppress ALL -->
<ui:composition xmlns:ui="jakarta.faces.facelets"
                xmlns:h="jakarta.faces.html"
                xmlns:p="http://primefaces.org/ui"
                xmlns:f="jakarta.faces.core"
                xmlns="http://www.w3.org/1999/xhtml" template="/template.xhtml">

    <ui:define name="title">Kategorie wählen</ui:define>

    <ui:define name="page">

        <br/>

        <h:form id="fm">
            <input type="hidden" name="_csrf" value="#{_csrf.token}"/>

            <p:messages/>

            <h:panelGrid columns="3" id="inputelements">

                <p:selectOneMenu value="#{beobachterBean.auswahl}">

                    <f:selectItem itemLabel="Kategorie Auswaehlen" itemValue=""/>
                    <f:selectItems value="#{beobachterBean.kategorien}"/>

                    <p:ajax update="historie" event="change" actionListener="#{beobachterBean.auswahl}"/>

                </p:selectOneMenu>

            </h:panelGrid>

            <br/>

            <p:fieldset legend="Historie">
                <h:panelGroup id="historie" layout="block">
                    <h:outputText value="#{beobachterBean.getHistorie()}" escape="false"/>
                </h:panelGroup>
            </p:fieldset>
        </h:form>

    </ui:define>

</ui:composition>
