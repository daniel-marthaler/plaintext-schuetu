<?xml version="1.0" encoding="utf-8" standalone="no"?>


<!--suppress ALL -->
<ui:composition xmlns:ui="jakarta.faces.facelets"
                xmlns:h="jakarta.faces.html"
                xmlns:p="http://primefaces.org/ui"
                xmlns:f="jakarta.faces.core"
                xmlns="http://www.w3.org/1999/xhtml" template="/includes/template.xhtml">

    <ui:define name="title">Mannschaften für Turnier: #{gameSelectionHolder.game.model.gameName} Clubdesk Export</ui:define>

    <ui:define name="page">

        <p:messages/>
        <br/>
        <h:form id="fm">
            <input type="hidden" name="_csrf" value="#{_csrf.token}"/>

            <h:commandLink>
                <p:graphicImage value="/static/images/excel.png"/>
                <p:dataExporter type="xls" target="tbl" fileName="email-export" pageOnly="true"/>
            </h:commandLink>

            <p:dataTable emptyMessage="leer" id="tbl" var="mannschaft" value="#{gameSelectionHolder.game.findMannschaften()}" rowIndexVar="ri">

                <p:column  headerText="E-Mail">
                    <h:outputText value="#{mannschaft.begleitpersonEmail}"/>
                </p:column>

            </p:dataTable>

        </h:form>

    </ui:define>

</ui:composition>
