<?xml version="1.0" encoding="utf-8" standalone="no"?>

<!--suppress ALL -->
<ui:composition xmlns:ui="jakarta.faces.facelets" xmlns:h="jakarta.faces.html"
                xmlns:p="http://primefaces.org/ui" xmlns:f="jakarta.faces.core"
                xmlns="http://www.w3.org/1999/xhtml" template="/includes/template.xhtml">

    <ui:define name="title">#{i18n.t('Turnier anlegen / auswählen')}</ui:define>

    <ui:define name="page">
        <br/>
        <h:form id="fm">
            <input type="hidden" name="_csrf" value="#{_csrf.token}"/>

            <p:messages/>
            <p:fieldset>

                <h:panelGrid id="grid" columns="1">

                    <h:panelGrid columns="1" cellpadding="5">
                        <p:commandButton value="#{i18n.t('Neu')}" onclick="PF('dlg2').show();"
                                         rendered="#{plaintextSecurity.ifGranted('root')}">
                            <f:ajax execute="@form" render="@none"/>
                        </p:commandButton>
                    </h:panelGrid>

                    <h:panelGrid columns="5" cellpadding="5" rendered="#{gameSelectionHolder.hasGame()}">

                        <h:outputText value="#{i18n.t('Phasen wechseln:')}"/>

                        <p:commandButton id="anmeldung" value="#{i18n.t('Anmeldephase')}"
                                         disabled="#{!gameSelectionHolder.game.model.spielPhase.equals('anmeldung')}"
                                         actionListener="#{gameSelectionHolder.phaseAnmeldung()}"
                                         update=":fm" onstart="PF('blockIt').show()" oncomplete="PF('blockIt').hide()"/>

                        <p:commandButton id="katzuordnung" value="#{i18n.t('Kategoriezuordnung')}"
                                         disabled="#{!gameSelectionHolder.game.model.spielPhase.equals('kategorie')}"
                                         actionListener="#{gameSelectionHolder.phaseKategoriezuordnung()}"
                                         update=":fm" onstart="PF('blockIt').show()" oncomplete="PF('blockIt').hide()"/>

                        <p:commandButton id="spieltagezuordnung" value="#{i18n.t('Spieltagezuordnung')}"
                                         disabled="#{!gameSelectionHolder.game.model.spielPhase.equals('spieltage')}"
                                         actionListener="#{gameSelectionHolder.phaseSpielen()}"
                                         update=":fm" onstart="PF('blockIt').show()" oncomplete="PF('blockIt').hide()"/>

                        <p:commandButton id="spielzuordnung" value="#{i18n.t('Spielen')}"
                                         disabled="#{!gameSelectionHolder.game.model.spielPhase.equals('spielen')}"
                                         actionListener="#{gameSelectionHolder.phaseSpielen()}"
                                         update=":fm" onstart="PF('blockIt').show()" oncomplete="PF('blockIt').hide()"/>

                    </h:panelGrid>

                </h:panelGrid>

                <br/>

                <p:dataTable emptyMessage="-" id="tbl" widgetVar="tbl" var="gm" value="#{gameBackingBean.displayGames()}" rowIndexVar="ri">

                    <p:column headerText="Name" style="width:20%;">
                        <h:outputText value="#{gm.gameName}"/>
                    </p:column>

                    <p:column headerText="" style="width:20%;">
                        <p:commandButton icon="pi pi-play" value="#{i18n.t('auswählen')}" update=":fm"
                                         oncomplete="location.reload();"
                                         action="#{gameSelectionHolder.selectGame(gm.gameName)}"
                                         rendered="#{gm.initialisiert and (not gameSelectionHolder.hasGame() or not gm.gameName.equals(gameSelectionHolder.game.model.gameName))}"/>

                        <p:commandButton icon="pi pi-cog" value="#{i18n.t('initialisieren')}" update=":fm"
                                         oncomplete="location.reload();"
                                         action="#{gameRoot.selectGame(gm.gameName)}"
                                         rendered="#{not gm.initialisiert and plaintextSecurity.ifGranted('root')}" />
                    </p:column>

                    <p:column headerText="#{i18n.t('Phase')}" style="width:20%;">
                        <h:outputText value="#{gm.spielPhase}"/>
                    </p:column>

                    <p:column headerText="" style="width:auto;" rendered="#{plaintextSecurity.ifGranted('root')}">
                        <div style="display: flex; gap: 0.4rem; justify-content: flex-end;">
                            <p:commandButton icon="pi pi-pencil" title="#{i18n.t('Umbenennen')}"
                                             actionListener="#{gameBackingBean.prepareRename(gm.gameName)}"
                                             update=":fm:dlgRenameId"
                                             oncomplete="PF('dlgRename').show();"/>

                            <p:commandButton icon="pi pi-copy" title="#{i18n.t('Kopieren')}"
                                             actionListener="#{gameBackingBean.prepareCopy(gm.gameName)}"
                                             update=":fm:dlgCopyId"
                                             oncomplete="PF('dlgCopy').show();"/>

                            <a href="#{request.contextPath}/api/tournament/export/#{gm.gameName}"
                               title="#{i18n.t('Exportieren')}"
                               class="ui-button ui-widget ui-corner-all ui-button-icon-only"
                               style="text-decoration:none; display:inline-flex; align-items:center; justify-content:center; width:2.357rem; height:2.357rem;">
                                <span class="pi pi-download"/>
                            </a>

                            <p:commandButton icon="pi pi-trash" title="#{i18n.t('Löschen')}" update=":fm" action="#{gameService.deleteGame(gm.gameName)}">
                                <p:confirm header="#{i18n.t('Achtung !!!')}" message="#{i18n.t('Turnier wirklich löschen')}" icon="pi pi-exclamation-triangle"/>
                                <p:confirmDialog global="true" showEffect="fade" hideEffect="fade">
                                    <p:commandButton value="#{i18n.t('Ja')}" type="button" styleClass="ui-confirmdialog-yes" icon="pi pi-check"/>
                                    <p:commandButton value="#{i18n.t('Nein')}" type="button" styleClass="ui-confirmdialog-no" icon="pi pi-times"/>
                                </p:confirmDialog>
                            </p:commandButton>
                        </div>
                    </p:column>

                </p:dataTable>

                <p:dialog header="#{i18n.t('Turnier erstellen')}" widgetVar="dlg2" id="dlg2id" resizable="true">
                    <h:panelGrid columns="2" cellpadding="5">
                        <h:outputLabel value="#{i18n.t('Name:')}"/>
                        <p:inputText value="#{gameBackingBean.selected.gameName}"/>
                        <f:facet name="footer">
                            <br/>
                            <p:commandButton value="#{i18n.t('Speichern')}" actionListener="#{gameBackingBean.save()}" update=":fm" oncomplete="PF('dlg2').hide()"/>
                        </f:facet>
                    </h:panelGrid>
                </p:dialog>

                <p:dialog header="#{i18n.t('Turnier umbenennen')}" widgetVar="dlgRename" id="dlgRenameId" resizable="true">
                    <h:panelGrid columns="2" cellpadding="5">
                        <h:outputLabel value="#{i18n.t('Neuer Name:')}"/>
                        <p:inputText value="#{gameBackingBean.renameNewName}"/>
                        <f:facet name="footer">
                            <br/>
                            <p:commandButton value="#{i18n.t('Umbenennen')}" actionListener="#{gameBackingBean.rename()}" update=":fm" oncomplete="PF('dlgRename').hide()"/>
                        </f:facet>
                    </h:panelGrid>
                </p:dialog>

                <p:dialog header="#{i18n.t('Turnier kopieren')}" widgetVar="dlgCopy" id="dlgCopyId" resizable="true">
                    <h:panelGrid columns="2" cellpadding="5">
                        <h:outputLabel value="#{i18n.t('Quelle:')}"/>
                        <h:outputText value="#{gameBackingBean.copySourceName}"/>
                        <h:outputLabel value="#{i18n.t('Neuer Name:')}"/>
                        <p:inputText value="#{gameBackingBean.copyNewName}"/>
                        <f:facet name="footer">
                            <br/>
                            <p:commandButton value="#{i18n.t('Kopieren')}" actionListener="#{gameBackingBean.copyGame()}" update=":fm" oncomplete="PF('dlgCopy').hide()"/>
                        </f:facet>
                    </h:panelGrid>
                </p:dialog>

            </p:fieldset>

            <!-- Turnier importieren -->
            <p:fieldset legend="#{i18n.t('Turnier importieren')}" toggleable="true" collapsed="true"
                        style="margin-top: 1rem;" rendered="#{plaintextSecurity.ifGranted('root')}">
                <div style="display: flex; align-items: flex-end; gap: 1rem; flex-wrap: wrap;">
                    <div>
                        <h:outputLabel value="#{i18n.t('JSON-Datei:')}"/>
                        <br/>
                        <input type="file" id="importFile" accept=".json" style="margin-top:4px;"/>
                    </div>
                    <div>
                        <h:outputLabel value="#{i18n.t('Turniername:')}"/>
                        <br/>
                        <input type="text" id="importName" placeholder="#{i18n.t('Neuer Turniername')}"
                               class="ui-inputfield ui-widget" style="margin-top:4px; width:250px;"/>
                    </div>
                    <div>
                        <button type="button" onclick="importTournament()" class="ui-button ui-widget"
                                style="padding: 0.5rem 1rem; cursor: pointer;">
                            <i class="pi pi-upload" style="margin-right:4px;"/> #{i18n.t('Importieren')}
                        </button>
                    </div>
                </div>
                <p:messages id="importMessages"/>
                <script type="text/javascript">
                    //<![CDATA[
                    function importTournament() {
                        var fileInput = document.getElementById('importFile');
                        var nameInput = document.getElementById('importName');
                        if (!fileInput.files.length) { alert('Bitte eine JSON-Datei auswählen'); return; }
                        if (!nameInput.value.trim()) { alert('Bitte einen Turniernamen eingeben'); return; }
                        var formData = new FormData();
                        formData.append('file', fileInput.files[0]);
                        formData.append('name', nameInput.value.trim());
                        var csrfToken = document.querySelector('input[name="_csrf"]').value;
                        formData.append('_csrf', csrfToken);
                        fetch('#{request.contextPath}/api/tournament/import', {
                            method: 'POST',
                            body: formData
                        }).then(function(r) {
                            return r.text().then(function(t) { return {ok: r.ok, text: t}; });
                        }).then(function(res) {
                            if (res.ok) { alert('Import erfolgreich: ' + res.text); location.reload(); }
                            else { alert('Import fehlgeschlagen: ' + res.text); }
                        }).catch(function(e) { alert('Fehler: ' + e); });
                    }
                    //]]>
                </script>
            </p:fieldset>
        </h:form>
    </ui:define>
</ui:composition>
