<?xml version="1.0" encoding="utf-8" standalone="no"?>


<!--suppress ALL -->
<ui:composition xmlns:ui="jakarta.faces.facelets"
                xmlns:h="jakarta.faces.html"
                xmlns:p="http://primefaces.org/ui"
                xmlns:f="jakarta.faces.core"
                xmlns="http://www.w3.org/1999/xhtml" template="/template.xhtml">

    <ui:define name="title">Spiele für Turnier: #{gameSelectionHolder.game.model.gameName}</ui:define>

    <ui:define name="page">

        <p:messages/>
        <br/>
        <h:form id="fm">
            <input type="hidden" name="_csrf" value="#{_csrf.token}"/>
            <h:commandLink>
                <p:graphicImage value="/static/images/excel.png"/>
                <p:dataExporter type="xls" target="tbl" fileName="spiele" pageOnly="true"/>
            </h:commandLink>

            <p:dataTable emptyMessage="leer" id="tbl" var="obj" value="#{heftliDumper.spiele}" rowIndexVar="ri">

                <p:column exportable="false">
                    <f:facet name="nr">
                        <h:outputText value="Nr."/>
                    </f:facet>
                    <h:outputText value="#{ri +1}"/>
                </p:column>

                <p:column headerText="Zeit">
                    <h:outputText value="#{obj.get(0)}"/>
                </p:column>

                <p:column headerText="Platz">
                    <h:outputText value="#{obj.get(1)}"/>
                </p:column>

                <p:column headerText="Team A">
                    <h:outputText value="#{obj.get(2)}"/>
                </p:column>

                <p:column headerText="Team B">
                    <h:outputText value="#{obj.get(3)}"/>
                </p:column>

            </p:dataTable>

        </h:form>

    </ui:define>

</ui:composition>
