<?xml version="1.0" encoding="utf-8" standalone="no"?>

<!--suppress ALL -->
<ui:composition xmlns:ui="jakarta.faces.facelets"
                xmlns:h="jakarta.faces.html"
                xmlns="http://www.w3.org/1999/xhtml" template="/includes/template.xhtml">


    <ui:define name="title">#{i18n.t('Matrix')}</ui:define>

    <ui:define name="page">

        <h:form id="fm">
            <input type="hidden" name="_csrf" value="#{_csrf.token}"/>

            <h:panelGroup rendered="#{!gameSelectionHolder.hasGame()}" layout="block" style="padding:20px;">
                <p><h:outputText value="#{i18n.t('Bitte zuerst ein Turnier auf dem Dashboard auswählen.')}"/></p>
            </h:panelGroup>

            <h:panelGroup id="matrix" layout="block" rendered="#{gameSelectionHolder.hasGame()}">
                <h:outputText value="#{beobachterBean.getMatrix()}" escape="false"/>
            </h:panelGroup>
        </h:form>

    </ui:define>

</ui:composition>
