<?xml version="1.0" encoding="utf-8" standalone="no"?>


<!--suppress ALL -->
<ui:composition xmlns:ui="jakarta.faces.facelets"
                xmlns:h="jakarta.faces.html"
                xmlns:p="http://primefaces.org/ui"
                xmlns:f="jakarta.faces.core"
                xmlns="http://www.w3.org/1999/xhtml" template="/includes/template.xhtml">

    <ui:define name="title">Mannschaften für Turnier: #{gameSelectionHolder.game.model.gameName}</ui:define>

    <ui:define name="page">

        <p:messages/>
        <br/>
        <h:form id="fm">
            <input type="hidden" name="_csrf" value="#{_csrf.token}"/>
            <h:commandLink>
                <p:graphicImage value="/static/images/excel.png"/>
                <p:dataExporter type="xls" target="tbl" fileName="begleitpersonen" pageOnly="true"/>
            </h:commandLink>


            <p:dataTable emptyMessage="leer" id="tbl" var="mannschaft"
                         value="#{gameSelectionHolder.game.findMannschaften()}" rowIndexVar="ri">

                <p:column exportable="false">
                    <f:facet name="nr">
                        <h:outputText value="Nr."/>
                    </f:facet>
                    <h:outputText value="#{ri +1}"/>
                </p:column>

                <p:column id="name" filterBy="name" headerText="Name" filterMatchMode="contains">
                    <h:outputText value="#{mannschaft.name}"/>
                </p:column>

                <p:column id="begleitpersonAnrede" headerText="Anrede" filterMatchMode="contains">
                    <h:outputText value="#{mannschaft.begleitpersonAnrede}"/>
                </p:column>

                <p:column id="begleitpersonName" headerText="Begleitperson" filterMatchMode="contains">
                    <h:outputText value="#{mannschaft.begleitperson2Vorname} #{mannschaft.begleitperson2Name}"/>
                </p:column>

                <p:column id="begleitpersonStrasse" headerText="Strasse" filterMatchMode="contains">
                    <h:outputText value="#{mannschaft.begleitpersonStrasse}"/>
                </p:column>

                <p:column id="begleitpersonAdresse" headerText="Adresse" filterMatchMode="contains">
                    <h:outputText value="#{mannschaft.begleitpersonPLZOrt}"/>
                </p:column>

                <p:column id="anzahlSpieler" headerText="Teamgrösse" filterMatchMode="contains">
                    <h:outputText value="#{mannschaft.anzahlSpieler}"/>
                </p:column>


            </p:dataTable>


        </h:form>

    </ui:define>

</ui:composition>
