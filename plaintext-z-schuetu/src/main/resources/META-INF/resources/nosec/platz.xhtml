<!--suppress ALL -->
<ui:composition xmlns:ui="jakarta.faces.facelets"
                xmlns:h="jakarta.faces.html"
                xmlns:p="http://primefaces.org/ui"
                xmlns:f="jakarta.faces.core"
                xmlns="http://www.w3.org/1999/xhtml"
                template="info/template-noframe.xhtml">

    <ui:define name="title">Platz #{platzClockBean.platzName}</ui:define>

    <ui:define name="page">
        <style>
            body {
                background: #1a1a2e !important;
                color: #eee !important;
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif !important;
            }
            .pc-wrapper {
                min-height: 100vh;
                padding: 16px;
                display: flex;
                flex-direction: column;
                align-items: center;
            }
            .pc-header {
                width: 100%;
                display: flex;
                justify-content: space-between;
                align-items: center;
                font-size: 2.4em;
                font-weight: bold;
                color: #e2b714;
                margin-bottom: 12px;
            }
            .pc-phase {
                font-size: 1.6em;
                color: #aaa;
                margin-bottom: 16px;
            }
            .pc-teams {
                width: 100%;
                display: grid;
                grid-template-columns: 1fr 80px 1fr;
                gap: 12px;
                align-items: center;
                margin: 16px 0;
            }
            .pc-team-name {
                font-size: 1.8em;
                text-align: center;
                color: #fff;
                font-weight: bold;
            }
            .pc-score {
                font-size: 6em;
                text-align: center;
                color: #fff;
                font-variant-numeric: tabular-nums;
                font-weight: bold;
            }
            .pc-colon {
                font-size: 5em;
                text-align: center;
                color: #888;
            }
            .pc-btn-row {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 14px;
                width: 100%;
                margin-top: 10px;
            }
            .pc-btn-col {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 10px;
            }
            .pc-btn {
                font-size: 2em !important;
                padding: 22px 0 !important;
                border-radius: 12px !important;
                font-weight: bold !important;
            }
            .pc-btn.plus { background: #27ae60 !important; color: #fff !important; border: none !important; }
            .pc-btn.minus { background: #e74c3c !important; color: #fff !important; border: none !important; }
            .pc-finish {
                width: 100%;
                margin-top: 24px;
            }
            .pc-finish .ui-button {
                width: 100%;
                font-size: 1.4em !important;
                padding: 16px 0 !important;
                background: #e2b714 !important;
                color: #000 !important;
                border: none !important;
                border-radius: 12px !important;
                font-weight: bold !important;
            }
            .pc-empty {
                font-size: 2em;
                color: #888;
                margin-top: 40px;
                text-align: center;
                font-style: italic;
            }
            .pc-clock {
                font-size: 2.4em;
                color: #fff;
                font-variant-numeric: tabular-nums;
            }
        </style>

        <f:metadata>
            <f:viewParam name="platz" value="#{platzClockBean.platz}"/>
        </f:metadata>

        <h:form id="fm">
            <input type="hidden" name="_csrf" value="#{_csrf.token}"/>

            <p:poll interval="3" update="fm:clock"/>

            <h:panelGroup id="clock" layout="block" styleClass="pc-wrapper">

                <div class="pc-header">
                    <div>Platz #{platzClockBean.platzName}</div>
                    <div class="pc-clock">
                        <h:outputText value="#{platzClockBean.phaseText}"/>
                    </div>
                </div>

                <h:panelGroup rendered="#{platzClockBean.aktuellesSpiel != null}" layout="block" style="width:100%">
                    <div class="pc-teams">
                        <div class="pc-team-name">#{platzClockBean.aktuellesSpiel.mannschaftAName}</div>
                        <div></div>
                        <div class="pc-team-name">#{platzClockBean.aktuellesSpiel.mannschaftBName}</div>
                    </div>

                    <div class="pc-teams">
                        <div class="pc-score">#{platzClockBean.displayToreA}</div>
                        <div class="pc-colon">:</div>
                        <div class="pc-score">#{platzClockBean.displayToreB}</div>
                    </div>

                    <div class="pc-btn-row">
                        <div class="pc-btn-col">
                            <p:commandButton value="+" styleClass="pc-btn plus"
                                             actionListener="#{platzClockBean.incTeamA}"
                                             update="fm:clock"/>
                            <p:commandButton value="-" styleClass="pc-btn minus"
                                             actionListener="#{platzClockBean.decTeamA}"
                                             update="fm:clock"/>
                        </div>
                        <div class="pc-btn-col">
                            <p:commandButton value="+" styleClass="pc-btn plus"
                                             actionListener="#{platzClockBean.incTeamB}"
                                             update="fm:clock"/>
                            <p:commandButton value="-" styleClass="pc-btn minus"
                                             actionListener="#{platzClockBean.decTeamB}"
                                             update="fm:clock"/>
                        </div>
                    </div>

                    <div class="pc-finish">
                        <p:commandButton value="Spiel beenden"
                                         actionListener="#{platzClockBean.beenden}"
                                         update="fm:clock"/>
                    </div>
                </h:panelGroup>

                <h:panelGroup rendered="#{platzClockBean.aktuellesSpiel == null}"
                              layout="block" styleClass="pc-empty">
                    Kein aktives Spiel auf Platz #{platzClockBean.platzName}
                </h:panelGroup>

            </h:panelGroup>

        </h:form>
    </ui:define>
</ui:composition>
