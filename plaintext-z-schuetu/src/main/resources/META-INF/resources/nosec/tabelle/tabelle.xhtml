<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!--suppress ALL -->
<ui:composition xmlns:ui="jakarta.faces.facelets"
                xmlns:h="jakarta.faces.html"
                xmlns:p="http://primefaces.org/ui"
                xmlns:f="jakarta.faces.core"
                xmlns="http://www.w3.org/1999/xhtml"
                template="../info/template-noframe.xhtml">
    <ui:define name="main">
        <h:form id="fm">
            <input type="hidden" name="_csrf" value="#{_csrf.token}"/>

            <p:dataTable id="tbl" var="obj" value="#{historie.zeilen}" rowIndexVar="ri">

                <p:column headerText="Rang" style="width:7%">
                    <h:outputText value="#{ri+1}"/>
                </p:column>

                <p:column headerText="Team">
                    <h:outputText value="#{obj.mannschaft.getName()}"/>
                </p:column>

                <p:column headerText="Spiele gespielt" style="width:10%">
                    <h:outputText value="#{obj.spieleVorbei}"/>
                </p:column>

                <p:column headerText="Punkte" style="width:10%">
                    <h:outputText value="#{obj.punkte}"/>
                </p:column>

                <p:column headerText="Tore"  style="width:10%">
                    <h:outputText value="#{obj.toreErziehlt} - #{obj.toreKassiert}"/>
                </p:column>

                <p:column headerText="Tordifferenz"  style="width:10%">
                    <h:outputText value="#{obj.getTordifferenz()}"/>
                </p:column>

                <p:column headerText="Grund" style="width:10%">
                    <h:outputText value="#{obj.rangierungsgrund.toString().toLowerCase()}"/>
                </p:column>

            </p:dataTable>

        </h:form>
    </ui:define>
</ui:composition>
