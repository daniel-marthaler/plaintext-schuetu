name: Build And Deploy

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 1'  # Weekly SonarQube analysis (Monday 3:00 UTC)
  push:
    branches: ['**']
  pull_request:
    branches: [master]

permissions:
  contents: write
  packages: write

concurrency:
  group: ${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

jobs:
  pipeline:
    if: ${{ !contains(github.event.head_commit.message, '[skip-ci]') }}
    uses: daniel-marthaler/plaintext-scripts/.github/workflows/ci-cd-pipeline.yaml@master
    with:
      deploy-target: >-
        ${{ github.event_name == 'pull_request' && 'ci-only'
         || (github.ref == 'refs/heads/master' && 'release-all' || 'ci-only') }}
      project-name: plaintext-schuetu
      database-name: plaintext_schuetu
      dev-url: 'http://192.168.1.224:1130'
      prod-url: 'http://192.168.1.224:1132'
      integration-tests-enabled: true
      sonar-enabled: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    secrets: inherit
