spring:
  application:
    name: plaintext-schuetu
  profiles:
    active: dev
    include:
      - discovery
  config:
    import: optional:./plconfig/spring/application.yml
  main:
    allow-circular-references: true
    allow-bean-definition-overriding: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    url: jdbc:postgresql://localhost:5434/plaintext_schuetu
    username: plaintext
    password: plaintext
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    out-of-order: true
    validate-on-migrate: false

server:
  port: 8080
  forward-headers-strategy: FRAMEWORK
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain

joinfaces:
  faces-servlet:
    url-mappings:
      - "*.jsf"
      - "*.xhtml"
      - "*.html"
      - "/faces/*"
  primefaces:
    theme: plaintext

mad:
  autologin: true

plaintext:
  version: '@project.version@'
  stage: ${PLAINTEXT_ENV:dev}
  root:
    version: '@plaintext-root.version@'
  menu:
    scan-package: ch.plaintext
  mqtt:
    enabled: false
    broker-url: tcp://192.168.1.224:1883
    client-id: schuetu-prod
    topic-prefix: schuetu/events
  schiri:
    mobile:
      base-url: ${SCHIRI_MOBILE_BASE_URL:https://schuelerturnier.plaintext.ch}

logging:
  level:
    ch.plaintext: DEBUG
    org.springframework: INFO
